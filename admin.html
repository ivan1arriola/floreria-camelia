<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configurar Instagram - Florería Camelia</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/floreriacamelia.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body class="admin-page">
    <main class="admin-shell">
        <section class="admin-panel" aria-labelledby="admin-title">
            <div class="admin-brand">
                <img src="/floreriacamelia.png" alt="Florería Camelia">
                <div>
                    <p class="instagram-kicker mb-1">Florería Camelia</p>
                    <h1 id="admin-title">Configurar Instagram</h1>
                </div>
            </div>

            <form id="adminLoginForm" class="admin-form">
                <div class="mb-3">
                    <label for="adminPassword" class="form-label">Contraseña de administración</label>
                    <input type="password" class="form-control" id="adminPassword" name="adminPassword" autocomplete="current-password" required>
                </div>

                <label class="admin-remember">
                    <input type="checkbox" id="rememberAdminSession" name="rememberAdminSession">
                    <span>Recordarme en este dispositivo</span>
                </label>

                <div class="admin-actions">
                    <button type="submit" class="btn btn-primary">
                        <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                        <i class="bi bi-unlock me-2" aria-hidden="true"></i>Ingresar
                    </button>
                </div>
            </form>

            <form id="instagramSettingsForm" class="admin-form d-none">
                <div class="admin-session-bar">
                    <span id="adminSessionStatus">Sesión iniciada</span>
                    <button type="button" id="logoutAdminSession" class="btn btn-outline-primary">
                        <i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>Salir
                    </button>
                </div>

                <div class="mb-3">
                    <label for="accessToken" class="form-label">Access token de Instagram</label>
                    <textarea class="form-control" id="accessToken" name="accessToken" rows="4" autocomplete="off" placeholder="Pegá acá el access token"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="userId" class="form-label">Instagram User ID</label>
                        <input type="text" class="form-control" id="userId" name="userId" value="me">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="mediaLimit" class="form-label">Cantidad de publicaciones</label>
                        <input type="number" class="form-control" id="mediaLimit" name="mediaLimit" min="1" max="12" value="12">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="featuredMediaIds" class="form-label">Publicaciones destacadas primero</label>
                    <textarea class="form-control" id="featuredMediaIds" name="featuredMediaIds" rows="3" autocomplete="off" placeholder="Pegá IDs o enlaces de Instagram, uno por línea"></textarea>
                </div>

                <div class="mb-3">
                    <label for="highlightStories" class="form-label">Historias destacadas</label>
                    <textarea class="form-control" id="highlightStories" name="highlightStories" rows="5" autocomplete="off" placeholder="Nombre | URL de imagen | enlace de Instagram"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="graphVersion" class="form-label">Versión Graph API</label>
                        <input type="text" class="form-control" id="graphVersion" name="graphVersion" value="v25.0">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="graphBaseUrl" class="form-label">API base</label>
                        <select class="form-select" id="graphBaseUrl" name="graphBaseUrl">
                            <option value="https://graph.instagram.com">Instagram Login</option>
                            <option value="https://graph.facebook.com">Facebook Login</option>
                        </select>
                    </div>
                </div>

                <div class="admin-actions">
                    <button type="button" id="checkInstagramSettings" class="btn btn-outline-primary">
                        <i class="bi bi-shield-check me-2" aria-hidden="true"></i>Ver estado
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                        <i class="bi bi-save me-2" aria-hidden="true"></i>Guardar configuración
                    </button>
                </div>
            </form>

            <div id="adminMessage" class="admin-message d-none" role="status"></div>
            <a href="/" class="admin-back-link">
                <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>Volver al sitio
            </a>
        </section>
    </main>

    <script src="/js/instagram-admin.js"></script>
</body>
</html>
